name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get install -y ssh

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_DIR="/home/Taxi/Taxi_backend"

            git config --global --add safe.directory "$DEPLOY_DIR"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone "${{ github.server_url }}/${{ github.repository }}.git" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard origin/main

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install psycopg2-binary

            if [ ! -f ".env" ]; then
              cat > .env << EOL
PROJECT_NAME="Colchester Taxi Booking System"
DATABASE_URL="postgresql://taxi_user:TaxiDb2026!SecurePass@localhost:5432/taxi_db"
JWT_SECRET="${{ secrets.JWT_SECRET }}"
JWT_ALGORITHM="HS256"
ACCESS_TOKEN_EXPIRE_MINUTES=1440
OPENROUTE_SERVICE_API_KEY="${{ secrets.OPENROUTE_SERVICE_API_KEY }}"
STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}"
STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}"
TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}"
TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}"
TWILIO_PHONE_NUMBER="${{ secrets.TWILIO_PHONE_NUMBER }}"
SMTP_HOST="smtp.ionos.co.uk"
SMTP_PORT=587
SMTP_USER="${{ secrets.SMTP_USER }}"
SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
SMTP_FROM="${{ secrets.SMTP_FROM }}"
BUSINESS_TIMEZONE="Europe/London"
GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}"
EOL
            fi

            python3 seed.py

            pm2 startOrReload ecosystem.config.js
            pm2 save
